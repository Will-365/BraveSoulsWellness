<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin Dashboard | Brave Souls Wellness</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;0,700;1,400;1,600&family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<script>
  // Auth Check - Redirect to login if not authenticated
  if (sessionStorage.getItem('bsw_admin_auth') !== 'true') {
    window.location.href = 'admin-login.html';
  }
</script>
<style>
:root {
  --green-deep:   #0e2818;
  --green-mid:    #1a4230;
  --green-light:  #2d6648;
  --gold:         #c8942a;
  --gold-light:   #e4b84a;
  --cream:        #faf6ed;
  --white:        #ffffff;
  --bg-gray:      #f8f9fa;
  --text-dark:    #1e2e22;
  --text-muted:   #6b7c71;
  --border:       rgba(0,0,0,0.06);
  --shadow:       0 12px 40px rgba(14,40,24,0.06);
  --radius:       12px;
  --transition:   0.3s cubic-bezier(0.4, 0, 0.2, 1);
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: 'Outfit', sans-serif;
  color: var(--text-dark);
  background: var(--bg-gray);
  display: flex;
  min-height: 100vh;
  overflow-x: hidden;
}

/* Sidebar */
.sidebar {
  width: 280px;
  background: var(--green-deep);
  color: var(--white);
  display: flex;
  flex-direction: column;
  padding: 40px 0;
  flex-shrink: 0;
  position: relative;
  z-index: 100;
  transition: transform var(--transition);
}
.sidebar-logo {
  padding: 0 40px 40px;
  border-bottom: 1px solid rgba(255,255,255,0.08);
  margin-bottom: 30px;
  text-align: center;
}
.sidebar-logo img {
  height: 60px;
  object-fit: contain;
}
.nav-item {
  display: flex;
  align-items: center;
  gap: 16px;
  padding: 18px 40px;
  color: rgba(255,255,255,0.6);
  text-decoration: none;
  font-size: 15px;
  font-weight: 500;
  transition: var(--transition);
  border-left: 4px solid transparent;
}
.nav-item:hover {
  color: var(--white);
  background: rgba(255,255,255,0.03);
}
.nav-item.active {
  color: var(--gold-light);
  background: linear-gradient(90deg, rgba(200,148,42,0.15) 0%, transparent 100%);
  border-left-color: var(--gold);
}
.nav-item-icon { font-size: 20px; }
.sidebar-bottom {
  margin-top: auto;
  padding: 0 40px;
}
.logout-btn {
  display: inline-flex;
  align-items: center;
  gap: 12px;
  color: rgba(255,255,255,0.5);
  text-decoration: none;
  font-size: 14px;
  font-weight: 500;
  transition: color 0.2s;
  padding: 12px 0;
}
.logout-btn:hover { color: #ff6b6b; }

/* Main Content */
.main-content {
  flex: 1;
  display: flex;
  flex-direction: column;
  min-width: 0;
  background: var(--bg-gray);
  position: relative;
}
.header {
  height: 90px;
  background: var(--white);
  border-bottom: 1px solid var(--border);
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 0 50px;
  position: sticky;
  top: 0;
  z-index: 50;
}
.page-title {
  font-family: 'Cormorant Garamond', serif;
  font-size: 2rem;
  font-weight: 700;
  color: var(--green-deep);
}
.header-actions {
  display: flex;
  align-items: center;
  gap: 16px;
}
.btn {
  display: inline-flex;
  align-items: center;
  gap: 8px;
  padding: 12px 24px;
  border-radius: 8px;
  font-family: 'Outfit', sans-serif;
  font-size: 14px;
  font-weight: 600;
  cursor: pointer;
  transition: var(--transition);
  border: none;
  outline: none;
}
.btn-refresh {
  background: var(--white);
  border: 1px solid #e2e8f0;
  color: var(--text-dark);
  box-shadow: 0 2px 8px rgba(0,0,0,0.04);
}
.btn-refresh:hover {
  background: var(--cream);
  border-color: var(--gold);
  color: var(--gold);
}
.btn-export {
  background: var(--green-deep);
  color: var(--white);
  box-shadow: 0 4px 12px rgba(14,40,24,0.15);
}
.btn-export:hover {
  background: var(--gold);
  transform: translateY(-2px);
  box-shadow: 0 6px 16px rgba(200,148,42,0.25);
}

/* Mobile Toggle */
.mobile-toggle {
  display: none;
  background: none;
  border: none;
  font-size: 24px;
  color: var(--green-deep);
  cursor: pointer;
  padding: 10px;
}

/* Filters Area */
.filters-wrap {
  padding: 40px 50px 0;
}
.filter-tabs {
  display: flex;
  gap: 12px;
  overflow-x: auto;
  padding-bottom: 10px;
  scrollbar-width: none; /* Firefox */
}
.filter-tabs::-webkit-scrollbar { display: none; }
.filter-tab {
  padding: 10px 20px;
  background: var(--white);
  border: 1px solid var(--border);
  border-radius: 30px;
  font-family: 'Outfit', sans-serif;
  font-size: 14px;
  font-weight: 500;
  color: var(--text-muted);
  cursor: pointer;
  white-space: nowrap;
  transition: var(--transition);
  box-shadow: 0 2px 8px rgba(0,0,0,0.02);
}
.filter-tab:hover {
  border-color: rgba(200,148,42,0.5);
  color: var(--gold);
}
.filter-tab.active {
  background: var(--gold);
  color: var(--white);
  border-color: var(--gold);
  box-shadow: 0 4px 12px rgba(200,148,42,0.25);
}

/* Table Area */
.content-area {
  padding: 30px 50px 50px;
  flex: 1;
  overflow-y: auto;
}
.table-card {
  background: var(--white);
  border-radius: var(--radius);
  box-shadow: var(--shadow);
  border: 1px solid var(--border);
  overflow: hidden;
  position: relative;
}
.table-header {
  padding: 24px 30px;
  border-bottom: 1px solid var(--border);
  display: flex;
  align-items: center;
  justify-content: space-between;
  background: #fff;
}
.table-title {
  font-size: 1.15rem;
  font-weight: 600;
  color: var(--green-deep);
}
.table-count {
  font-size: 13px;
  font-weight: 600;
  color: var(--gold);
  background: rgba(200,148,42,0.1);
  padding: 6px 16px;
  border-radius: 20px;
}

.table-responsive {
  width: 100%;
  overflow-x: auto;
}
table {
  width: 100%;
  border-collapse: collapse;
  text-align: left;
}
th {
  background: #fcfdfe;
  padding: 18px 30px;
  font-size: 11px;
  font-weight: 700;
  letter-spacing: 1.2px;
  text-transform: uppercase;
  color: #889891;
  border-bottom: 1px solid #edf0f2;
  white-space: nowrap;
}
td {
  padding: 24px 30px;
  border-bottom: 1px solid #edf0f2;
  font-size: 14.5px;
  color: var(--text-dark);
  vertical-align: top;
}
tr:last-child td { border-bottom: none; }
tr:hover td { background: #fdfdfd; }

.td-name { font-weight: 600; color: var(--green-deep); }
.td-contact { line-height: 1.6; }
.td-contact-label { font-size: 12px; color: var(--text-muted); }
.td-contact-val { font-size: 14px; color: var(--text-dark); margin-bottom: 4px; }

.badge-program {
  display: inline-flex;
  align-items: center;
  padding: 6px 14px;
  background: rgba(45,102,72,0.08);
  color: var(--green-light);
  border: 1px solid rgba(45,102,72,0.15);
  border-radius: 30px;
  font-size: 12.5px;
  font-weight: 600;
  line-height: 1.2;
}
.badge-program.elite {
  background: rgba(200,148,42,0.08);
  color: var(--gold);
  border-color: rgba(200,148,42,0.2);
}

.td-message {
  max-width: 320px;
  line-height: 1.6;
  color: var(--text-muted);
  font-size: 14px;
}
.td-date {
  white-space: nowrap;
  font-size: 13px;
  color: var(--text-muted);
  font-weight: 500;
}

/* Empty / Loading States */
.state-overlay {
  padding: 80px 40px;
  text-align: center;
  display: none;
}
.state-overlay.active { display: block; }
.spinner {
  width: 40px; height: 40px;
  border: 3px solid rgba(200,148,42,0.2);
  border-top-color: var(--gold);
  border-radius: 50%;
  animation: spin 1s linear infinite;
  margin: 0 auto 20px;
}
@keyframes spin { to { transform: rotate(360deg); } }
.state-text {
  color: var(--text-muted);
  font-size: 15px;
}

/* Responsive */
.mobile-overlay {
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.5);
  z-index: 90;
  opacity: 0;
  visibility: hidden;
  transition: var(--transition);
}
.mobile-overlay.active {
  opacity: 1;
  visibility: visible;
}

@media (max-width: 1024px) {
  .header { padding: 0 30px; }
  .filters-wrap { padding: 30px 30px 0; }
  .content-area { padding: 30px; }
  .td-message { max-width: 250px; }
}

@media (max-width: 768px) {
  .sidebar {
    position: fixed;
    height: 100%;
    transform: translateX(-100%);
  }
  .sidebar.open { transform: translateX(0); }
  .mobile-toggle { display: block; }
  .header { height: 70px; padding: 0 20px; }
  .header-actions { display: none; } /* Hide on mobile to save space */
  .page-title { font-size: 1.5rem; }
  .filters-wrap { padding: 20px 20px 0; }
  .content-area { padding: 20px; }
  .table-header { padding: 20px; flex-direction: column; align-items: flex-start; gap: 12px; }
  th, td { padding: 16px 20px; }
}
</style>
</head>
<body>

<!-- Mobile Overlay -->
<div class="mobile-overlay" id="mobileOverlay" onclick="toggleSidebar()"></div>

<!-- Sidebar -->
<aside class="sidebar" id="sidebar">
  <div class="sidebar-logo">
    <img src="images/logo-white.png" onerror="this.src='images/logo.png'" alt="Logo">
  </div>
  <nav class="sidebar-nav">
    <a href="#" class="nav-item active">
      <span class="nav-item-icon">📋</span> Form Submissions
    </a>
    <a href="#" class="nav-item">
      <span class="nav-item-icon">⚙️</span> Settings
    </a>
  </nav>
  <div class="sidebar-bottom">
    <a href="#" class="logout-btn" onclick="handleLogout()">
      <span class="nav-item-icon">🚪</span> Log out
    </a>
  </div>
</aside>

<!-- Main Content -->
<main class="main-content">
  <header class="header">
    <div style="display:flex; align-items:center; gap:16px;">
      <button class="mobile-toggle" onclick="toggleSidebar()">☰</button>
      <h1 class="page-title">Dashboard</h1>
    </div>
    <div class="header-actions">
      <button class="btn btn-refresh" onclick="loadData()">↻ Refresh Data</button>
      <button class="btn btn-export" onclick="exportCSV()">↓ Export to CSV</button>
    </div>
  </header>
  
  <div class="filters-wrap">
    <div class="filter-tabs" id="filterTabs">
      <button class="filter-tab active" data-filter="All">All Submissions</button>
      <button class="filter-tab" data-filter="SheBraveElite">SheBraveElite</button>
      <button class="filter-tab" data-filter="Executive Coaching">Executive Coaching</button>
      <button class="filter-tab" data-filter="Personal Coaching">Personal Coaching</button>
      <button class="filter-tab" data-filter="Community Programs">Community Programs</button>
      <button class="filter-tab" data-filter="Other">Other</button>
    </div>
  </div>

  <div class="content-area">
    <div class="table-card">
      <div class="table-header">
        <div class="table-title" id="currentViewTitle">Recent Submissions</div>
        <div class="table-count" id="countBadge">0 total</div>
      </div>
      
      <!-- Loading State -->
      <div class="state-overlay active" id="loadingState">
        <div class="spinner"></div>
        <div class="state-text">Fetching securely from Google Sheets...</div>
      </div>
      
      <!-- Empty State -->
      <div class="state-overlay" id="emptyState">
        <div style="font-size: 40px; margin-bottom: 16px;">📭</div>
        <div class="state-text" id="emptyText">No submissions found.</div>
      </div>

      <div class="table-responsive" id="tableContainer" style="display: none;">
        <table id="submissionsTable">
          <thead>
            <tr>
              <th>Date</th>
              <th>Applicant Name</th>
              <th>Contact Details</th>
              <th>Program Interest</th>
              <th>Biggest Challenge</th>
              <th>Source</th>
            </tr>
          </thead>
          <tbody id="tableBody">
            <!-- Data will be injected here via JS -->
          </tbody>
        </table>
      </div>
    </div>
  </div>
</main>

<script>
const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbxqkpI5myxmD7YkeYi7DYs17ZoTvhBgQERRnWdFAt8SBNwVSQpj123khXTTeX80ES31aQ/exec";

let allData = [];
let currentFilter = "All";

// --- UI Actions ---
function toggleSidebar() {
  document.getElementById('sidebar').classList.toggle('open');
  document.getElementById('mobileOverlay').classList.toggle('active');
}

function handleLogout() {
  sessionStorage.removeItem('bsw_admin_auth');
  window.location.href = 'admin-login.html';
}

// --- Filtering ---
const tabs = document.querySelectorAll('.filter-tab');
tabs.forEach(tab => {
  tab.addEventListener('click', () => {
    // Update active tab styling
    tabs.forEach(t => t.classList.remove('active'));
    tab.classList.add('active');
    
    currentFilter = tab.dataset.filter;
    document.getElementById('currentViewTitle').textContent = currentFilter === 'All' ? 'All Submissions' : currentFilter + ' Submissions';
    
    applyFilter();
  });
});

function applyFilter() {
  if (allData.length === 0) return;
  
  let filteredData = allData;
  if (currentFilter !== 'All') {
    if (currentFilter === 'Other') {
      const known = ['SheBraveElite', 'Executive Coaching', 'Personal Coaching', 'Community Programs'];
      filteredData = allData.filter(d => !known.some(k => d.program && d.program.includes(k)));
    } else {
      filteredData = allData.filter(d => d.program && d.program.includes(currentFilter));
    }
  }
  
  renderTable(filteredData);
}

// --- Data Fetching ---
function loadData() {
  const tbody = document.getElementById('tableBody');
  const loader = document.getElementById('loadingState');
  const emptyState = document.getElementById('emptyState');
  const tableCont = document.getElementById('tableContainer');
  const countBadge = document.getElementById('countBadge');

  tableCont.style.display = 'none';
  emptyState.classList.remove('active');
  loader.classList.add('active');
  countBadge.textContent = `...`;

  fetch(SCRIPT_URL, { redirect: 'follow' })
    .then(response => response.text())
    .then(text => {
      loader.classList.remove('active');
      try {
        const result = JSON.parse(text);
        if (result.status === 'success') {
          allData = result.data;
          applyFilter();
        } else {
          showError(`Error: ${result.message}`);
        }
      } catch(e) {
        showError(`Could not parse data. Ensure your Apps Script is deployed properly.`);
        console.error("Parse error:", e, text);
      }
    })
    .catch(error => {
      loader.classList.remove('active');
      showError(`Connection error. Ensure you have internet and CORS is allowed.`);
      console.error("Fetch error:", error);
    });
}

function showError(msg) {
  const emptyState = document.getElementById('emptyState');
  document.getElementById('emptyText').textContent = msg;
  emptyState.classList.add('active');
  document.getElementById('tableContainer').style.display = 'none';
  document.getElementById('countBadge').textContent = 'Error';
}

// --- Rendering ---
function renderTable(data) {
  const tbody = document.getElementById('tableBody');
  const emptyState = document.getElementById('emptyState');
  const tableCont = document.getElementById('tableContainer');
  const countBadge = document.getElementById('countBadge');
  
  tbody.innerHTML = '';
  countBadge.textContent = `${data.length} ${data.length === 1 ? 'submission' : 'submissions'}`;
  
  if (data.length === 0) {
    document.getElementById('emptyText').textContent = currentFilter === 'All' ? 'No submissions yet.' : `No submissions found for ${currentFilter}.`;
    emptyState.classList.add('active');
    tableCont.style.display = 'none';
    return;
  }
  
  emptyState.classList.remove('active');
  tableCont.style.display = 'block';
  
  data.forEach(item => {
    // Format program pill
    let programText = item.program || 'N/A';
    let isElite = programText.toLowerCase().includes('elite');
    let badgeClass = isElite ? 'badge-program elite' : 'badge-program';

    // Format contact
    let emailHtml = item.email ? `<div class="td-contact-val"><span class="td-contact-label">E:</span> <a href="mailto:${item.email}" style="color:inherit;text-decoration:none;">${item.email}</a></div>` : '';
    let phoneHtml = item.whatsapp ? `<div class="td-contact-val"><span class="td-contact-label">P:</span> <a href="https://wa.me/${String(item.whatsapp).replace(/\D/g,'')}" target="_blank" style="color:inherit;text-decoration:none;">${item.whatsapp}</a></div>` : '';

    const tr = document.createElement('tr');
    tr.innerHTML = `
      <td class="td-date">${item.timestamp || 'N/A'}</td>
      <td class="td-name">${item.firstName || ''} ${item.lastName || ''}</td>
      <td class="td-contact">
        ${emailHtml}
        ${phoneHtml}
      </td>
      <td><span class="${badgeClass}">${programText}</span></td>
      <td class="td-message">${item.challenge || '-'}</td>
      <td><div style="font-size: 13px; color: var(--text-muted);">${item.source || '-'}</div></td>
    `;
    tbody.appendChild(tr);
  });
}

// --- Export to CSV ---
function exportCSV() {
  if (allData.length === 0) {
    alert("No data to export!");
    return;
  }
  
  // Get headers from first object
  const headers = Object.keys(allData[0]);
  const csvRows = [];
  
  // Header row
  csvRows.push(headers.join(','));
  
  // Data rows
  allData.forEach(row => {
    const values = headers.map(header => {
      let val = row[header] ? row[header].toString() : '';
      val = val.replace(/"/g, '""'); // escape quotes
      if (val.search(/("|,|\n)/g) >= 0) {
        val = `"${val}"`; // quote fields with commas or newlines
      }
      return val;
    });
    csvRows.push(values.join(','));
  });
  
  const csvString = csvRows.join('\n');
  const blob = new Blob([csvString], { type: 'text/csv' });
  const url = window.URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.setAttribute('hidden', '');
  a.setAttribute('href', url);
  a.setAttribute('download', `bsw_submissions_${new Date().toISOString().slice(0,10)}.csv`);
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
}

// Initialize
document.addEventListener('DOMContentLoaded', loadData);
</script>
</body>
</html>
