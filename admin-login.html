<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin Login | Brave Souls Wellness</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;0,700;1,400;1,600&family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
:root {
  --green-deep: #0e2818;
  --green-mid:  #1a4230;
  --gold:       #c8942a;
  --gold-light: #e4b84a;
  --cream:      #faf6ed;
  --white:      #ffffff;
  --text-dark:  #1e2e22;
  --text-muted: #5a7060;
  --error:      #e05252;
}
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html, body { height: 100%; }
body {
  font-family: 'Outfit', sans-serif;
  background: var(--green-deep);
  display: flex;
  align-items: center;
  justify-content: center;
  min-height: 100vh;
  overflow: hidden;
}

/* Animated background */
.bg-wrap {
  position: fixed;
  inset: 0;
  z-index: 0;
  overflow: hidden;
}
.bg-wrap::before {
  content: '';
  position: absolute;
  width: 700px; height: 700px;
  background: radial-gradient(circle, rgba(200,148,42,0.18) 0%, transparent 70%);
  top: -200px; right: -200px;
  animation: float1 8s ease-in-out infinite;
}
.bg-wrap::after {
  content: '';
  position: absolute;
  width: 500px; height: 500px;
  background: radial-gradient(circle, rgba(45,102,72,0.35) 0%, transparent 70%);
  bottom: -100px; left: -100px;
  animation: float2 10s ease-in-out infinite;
}
.bg-grid {
  position: absolute;
  inset: 0;
  background-image: linear-gradient(rgba(200,148,42,0.04) 1px, transparent 1px),
                    linear-gradient(90deg, rgba(200,148,42,0.04) 1px, transparent 1px);
  background-size: 60px 60px;
}
@keyframes float1 { 0%,100%{transform:translate(0,0)} 50%{transform:translate(-30px,30px)} }
@keyframes float2 { 0%,100%{transform:translate(0,0)} 50%{transform:translate(30px,-20px)} }

/* Card */
.card {
  position: relative;
  z-index: 1;
  background: var(--white);
  width: 100%;
  max-width: 460px;
  margin: 20px;
  border-radius: 16px;
  overflow: hidden;
  box-shadow: 0 40px 80px rgba(0,0,0,0.4);
  animation: slideUp 0.6s cubic-bezier(0.25,0.46,0.45,0.94) both;
}
@keyframes slideUp { from{opacity:0;transform:translateY(40px)} to{opacity:1;transform:translateY(0)} }

.card-top {
  background: linear-gradient(135deg, var(--green-deep) 0%, var(--green-mid) 100%);
  padding: 40px 48px 36px;
  text-align: center;
  position: relative;
}
.card-top::after {
  content: '';
  position: absolute;
  bottom: 0; left: 0; right: 0;
  height: 3px;
  background: linear-gradient(90deg, transparent, var(--gold), transparent);
}
.logo-box {
  width: 72px; height: 72px;
  background: rgba(200,148,42,0.15);
  border: 1px solid rgba(200,148,42,0.3);
  border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  margin: 0 auto 20px;
}
.logo-box img { width: 48px; height: 48px; object-fit: contain; }
.card-title {
  font-family: 'Cormorant Garamond', serif;
  font-size: 2rem;
  font-weight: 700;
  color: var(--white);
  letter-spacing: -0.5px;
}
.card-title em { color: var(--gold-light); font-style: italic; }
.card-sub {
  font-size: 13px;
  color: rgba(255,255,255,0.6);
  margin-top: 6px;
}

.card-body { padding: 36px 48px 40px; }

.form-group { margin-bottom: 20px; }
.form-group label {
  display: block;
  font-size: 11px;
  font-weight: 700;
  letter-spacing: 1.2px;
  text-transform: uppercase;
  color: var(--text-muted);
  margin-bottom: 8px;
}
.input-wrap { position: relative; }
.input-wrap input {
  width: 100%;
  padding: 14px 16px 14px 44px;
  border: 1.5px solid #e8e8e8;
  border-radius: 8px;
  font-family: 'Outfit', sans-serif;
  font-size: 14px;
  color: var(--text-dark);
  background: #fafafa;
  outline: none;
  transition: all 0.3s ease;
}
.input-wrap input:focus {
  border-color: var(--gold);
  background: var(--white);
  box-shadow: 0 0 0 4px rgba(200,148,42,0.1);
}
.input-icon {
  position: absolute;
  left: 14px; top: 50%;
  transform: translateY(-50%);
  font-size: 16px;
  pointer-events: none;
}
.input-toggle {
  position: absolute;
  right: 14px; top: 50%;
  transform: translateY(-50%);
  cursor: pointer;
  font-size: 16px;
  user-select: none;
}

.error-msg {
  display: none;
  background: rgba(224,82,82,0.1);
  border: 1px solid rgba(224,82,82,0.3);
  border-radius: 8px;
  padding: 12px 16px;
  font-size: 13px;
  color: var(--error);
  margin-bottom: 20px;
  text-align: center;
}
.error-msg.show { display: block; animation: shake 0.4s ease; }
@keyframes shake {
  0%,100%{transform:translateX(0)} 20%,60%{transform:translateX(-6px)} 40%,80%{transform:translateX(6px)}
}

.btn-login {
  width: 100%;
  padding: 16px;
  background: linear-gradient(135deg, var(--green-deep) 0%, var(--green-mid) 100%);
  color: var(--white);
  font-family: 'Outfit', sans-serif;
  font-size: 13px;
  font-weight: 700;
  letter-spacing: 1.5px;
  text-transform: uppercase;
  border: none;
  border-radius: 8px;
  cursor: pointer;
  transition: all 0.3s ease;
  position: relative;
  overflow: hidden;
}
.btn-login::before {
  content: '';
  position: absolute;
  inset: 0;
  background: linear-gradient(135deg, var(--gold) 0%, var(--gold-light) 100%);
  opacity: 0;
  transition: opacity 0.3s;
}
.btn-login:hover::before { opacity: 1; }
.btn-login span { position: relative; z-index: 1; }
.btn-login.loading span::after { content: ' ●●●'; animation: dots 1s infinite; }
@keyframes dots {
  0%{content:' ●○○'} 33%{content:' ●●○'} 66%{content:' ●●●'} 100%{content:' ●○○'}
}

.back-link {
  display: block;
  text-align: center;
  margin-top: 20px;
  font-size: 13px;
  color: var(--text-muted);
  text-decoration: none;
  transition: color 0.2s;
}
.back-link:hover { color: var(--gold); }

@media (max-width: 500px) {
  .card-top, .card-body { padding-left: 28px; padding-right: 28px; }
}
</style>
</head>
<body>
<div class="bg-wrap"><div class="bg-grid"></div></div>

<div class="card">
  <div class="card-top">
    <div class="logo-box">
      <img src="images/logo.png" alt="Logo">
    </div>
    <h1 class="card-title">Admin <em>Portal</em></h1>
    <p class="card-sub">Brave Souls Wellness — Secure Access</p>
  </div>

  <div class="card-body">
    <div class="error-msg" id="errorMsg">❌ Incorrect email or password. Please try again.</div>

    <form id="loginForm" onsubmit="handleLogin(event)">
      <div class="form-group">
        <label>Email Address</label>
        <div class="input-wrap">
          <span class="input-icon">✉️</span>
          <input type="email" id="adminEmail" placeholder="admin@bravesoulswellness.com" required autocomplete="email">
        </div>
      </div>
      <div class="form-group">
        <label>Password</label>
        <div class="input-wrap">
          <span class="input-icon">🔒</span>
          <input type="password" id="adminPassword" placeholder="••••••••" required autocomplete="current-password">
          <span class="input-toggle" onclick="togglePwd()" id="pwdToggle">👁️</span>
        </div>
      </div>
      <button type="submit" class="btn-login" id="loginBtn"><span>Sign In to Dashboard</span></button>
    </form>

    <a href="index.html" class="back-link">← Back to Brave Souls Wellness</a>
  </div>
</div>

<script>
// Hardcoded credentials
const ADMIN_EMAIL    = "hirwas@gmail.com";
const ADMIN_PASSWORD = "1234";

function handleLogin(e) {
  e.preventDefault();
  const email    = document.getElementById('adminEmail').value.trim().toLowerCase();
  const password = document.getElementById('adminPassword').value;
  const btn      = document.getElementById('loginBtn');
  const errorMsg = document.getElementById('errorMsg');

  // Show loading state
  btn.classList.add('loading');
  btn.disabled = true;
  errorMsg.classList.remove('show');

  setTimeout(() => {
    if (email === ADMIN_EMAIL && password === ADMIN_PASSWORD) {
      // Save session and redirect
      sessionStorage.setItem('bsw_admin_auth', 'true');
      window.location.href = 'admin-dashboard.html';
    } else {
      btn.classList.remove('loading');
      btn.disabled = false;
      errorMsg.classList.add('show');
    }
  }, 900);
}

function togglePwd() {
  const input  = document.getElementById('adminPassword');
  const toggle = document.getElementById('pwdToggle');
  if (input.type === 'password') {
    input.type = 'text';
    toggle.textContent = '🙈';
  } else {
    input.type = 'password';
    toggle.textContent = '👁️';
  }
}
</script>
</body>
</html>
